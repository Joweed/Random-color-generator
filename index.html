<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Honk:MORF@15&display=swap" rel="stylesheet">
    <title>RANDOM COLOR GENERATOR</title>
</head>
<body>
    <header>
        <div class="headerContainer">
            <section class="section">
                <h1>
                    RANDOM COLOR GENERATOR
                </h1>
            </section>
        </div>
    </header>
    <div class="mainContainer">
        <button id="button">GERAR!</button>
        <!-- <button id="aplicar">Aplicar</button> -->
        <button id="copiar" style="display: none;">Copiar</button>
        <p id="corCopiada" style="color: red; font-weight: bold;">Cor copiada!</p>
        <div class="previewColor">
            <div id="preview" style="width: 150px; height: 150px; border: 2px solid black; margin-top: 10px; border-radius: 100px;">
            </div>
            <input type="range" id="brightness" min="0" max="100" value="50">
        </div>
        <button id="reset" style="display:none;">Gerar outra cor</button>
    </div>
    
    <div id="containerHistorico">
            <ul id="listaCores">
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
    </div>
    

    <footer>
        <p>Inspirado em </p><a href="https://www.color-hex.com/">color-hex.com</a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
