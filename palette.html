<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paleta</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
            font-family: sans-serif;
        }

        .paleta{ 
            display: flex;
            gap: 15px;
        }
        .paleta p{
            font-size: 25px;
        }

        .cor {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid black;
        }
        .top {
            width: 100%;
            display: flex;
            justify-content: center;
            position: absolute;
            top: 20px;
        }
    </style>
</head>
<body>

    <div class="top"><a href="index.html"><button class="homeBtn">Página Inicial</button></a></div>

    <div class="paleta">
        <p>Cores análogas</p>
        <div class="cor"></div>
        <div class="cor"></div>
        <div class="cor"></div>
        <div class="cor"></div>
        <div class="cor"></div>
    </div>

    <script>

    function hexParaHSL(hex) {
        let r = parseInt(hex.substring(1, 3), 16) / 255;
        let g = parseInt(hex.substring(3, 5), 16) / 255;
        let b = parseInt(hex.substring(5, 7), 16) / 255;

        let max = Math.max(r, g, b);
        let min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;

        if (max === min) {
            h = s = 0;
        } else {
            let d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

            switch(max){
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }

            h = h * 60;
        }

        return { h, s: s * 100, l: l * 100 };
    }

    function gerarAnalogas(hsl) {
        return [
            hsl.h - 40,
            hsl.h - 20,
            hsl.h,
            hsl.h + 20,
            hsl.h + 40
        ];
    }

    function ajustarCor(hex, quantidade) {
        let num = parseInt(hex.replace('#', ''), 16);

        let r = (num >> 16) + quantidade;
        let g = ((num >> 8) & 0x00FF) + quantidade;
        let b = (num & 0x0000FF) + quantidade;

        r = Math.max(0, Math.min(255, r));
        g = Math.max(0, Math.min(255, g));
        b = Math.max(0, Math.min(255, b));

        return `rgb(${r}, ${g}, ${b})`;
    }

    // 🔥 EXECUÇÃO

    const cor = localStorage.getItem('corSelecionada');
    const cores = document.querySelectorAll('.cor');

    if (cor) {

        // 🎨 background com degradê
        const corMaisClara = ajustarCor(cor, 40);
        document.body.style.background =
            `linear-gradient(45deg, ${cor}, ${corMaisClara})`;

        // 🎯 paleta análoga
        const hsl = hexParaHSL(cor);
        const hues = gerarAnalogas(hsl);

        cores.forEach((el, index) => {

            let hue = hues[index];

            if (hue < 0) hue += 360;
            if (hue > 360) hue -= 360;

            el.style.backgroundColor =
                `hsl(${hue}, ${hsl.s}%, ${hsl.l}%)`;

        });
    }

    </script>

</body>
</html>
